name: served-matches-repo

# The README promises "What you see is what runs": the tool.js served from
# faturas.diogoandrade.com is byte-identical to the one in this repo. That claim IS the
# security model - people are asked to read the source and then run it against their tax
# account, so if the served file can silently diverge, reading the source proves nothing.
#
# Nothing enforced it. The Cloudflare Pages project is NOT git-connected: every deploy is a
# manual `wrangler pages deploy`. So a commit that is never deployed leaves GitHub looking
# correct while users run something else, and nobody finds out.
#
# This job fetches the live file and compares its SHA-256 to the committed one.
#
# It runs on a SCHEDULE, not on push, deliberately: right after a commit the live file is
# legitimately still the old one until you deploy. Failing on push would just cry wolf on
# every commit. A daily check catches the case that actually matters - a fix that was
# committed, and then never shipped.

on:
  schedule:
    - cron: "17 7 * * *"      # daily, 07:17 UTC
  workflow_dispatch:           # and on demand, e.g. right after a deploy

jobs:
  hash-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: served tool.js must match the committed one
        run: |
          set -euo pipefail
          for HOST in https://faturas.diogoandrade.com https://efatura-helper.pages.dev; do
            echo "--- $HOST"
            # cache-bust: the bookmarklet itself loads tool.js?v=<timestamp>
            curl -fsSL --max-time 30 "$HOST/tool.js?v=$(date +%s)" -o served.js
            LIVE=$(sha256sum served.js | cut -d' ' -f1)
            REPO=$(sha256sum tool.js  | cut -d' ' -f1)
            echo "  live: $LIVE"
            echo "  repo: $REPO"
            if [ "$LIVE" != "$REPO" ]; then
              echo "::error file=tool.js::$HOST is serving a DIFFERENT tool.js from this repo. The README's \"what you see is what runs\" claim is false right now. Either deploy the current commit (npx wrangler pages deploy . --project-name=efatura-helper) or revert whatever shipped."
              echo "--- diff (served vs repo) ---"
              diff <(cat served.js) tool.js | head -40 || true
              exit 1
            fi
            echo "  match"
          done

      - name: committed cae_sectors.json must match the live tax-rule table
        run: |
          set -euo pipefail
          # DEDUCOES.md tells accountants they can review the rules in this repo. A stale copy of a
          # tax-rule table is worse than no copy: it documents rules the tool is not applying.
          #
          # Compares the `map` object ONLY, not the whole document. /cae-map.json injects
          # meta.ranking at serve time, so a whole-file hash would fail every run for no reason.
          curl -fsSL --max-time 30 "https://cae-db.diogoandrade.com/cae-map.json?v=$(date +%s)" -o served-map.json
          python3 - <<'EOF'
          import json, sys
          served = json.load(open("served-map.json"))["map"]
          repo   = json.load(open("cae_sectors.json"))["map"]
          if served == repo:
              print(f"cae_sectors.json matches the live table ({len(repo)} CAE codes)")
              sys.exit(0)
          only_live = {k: served[k] for k in served.keys() - repo.keys()}
          only_repo = {k: repo[k]   for k in repo.keys()   - served.keys()}
          changed   = {k: (repo[k], served[k]) for k in served.keys() & repo.keys() if served[k] != repo[k]}
          print("::error file=cae_sectors.json::The committed CAE -> sector table no longer matches "
                "the one actually being applied at cae-db.diogoandrade.com. DEDUCOES.md invites "
                "accountants to review this file, so it must not drift. Re-export it from /data.")
          if only_live: print("  live has, repo missing :", only_live)
          if only_repo: print("  repo has, live missing :", only_repo)
          if changed:   print("  sector changed (repo -> live):", changed)
          sys.exit(1)
          EOF

      - name: index.html served must match too
        run: |
          set -euo pipefail
          curl -fsSL --max-time 30 "https://faturas.diogoandrade.com/?v=$(date +%s)" -o served.html
          LIVE=$(sha256sum served.html | cut -d' ' -f1)
          REPO=$(sha256sum index.html  | cut -d' ' -f1)
          if [ "$LIVE" != "$REPO" ]; then
            echo "::warning file=index.html::Served index.html differs from the repo. This is less critical than tool.js (the landing page is not what runs against your account) but it means the published privacy claims are not the ones in git."
            echo "  live: $LIVE"
            echo "  repo: $REPO"
          else
            echo "index.html matches"
          fi
